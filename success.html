	<script>

	var g_did_i_finish_reporting_to_server = 0;

	function getServerUrl()
	{
		try
		{
			console.log("getServerUrl()");

			const cacheBuster = new Date().getTime(); // unique value each call to prevent from getting a cached version
			const xhr = new XMLHttpRequest();
			xhr.open("GET", "https://beensman.github.io/rnt/server_url.txt?v=" + cacheBuster, false); // false = synchronous
			xhr.send(null);

			if (xhr.status >= 200 && xhr.status < 300)
			{
				console.log("URL: " + xhr.responseText.trim());
				return xhr.responseText.trim();
			}
			else
			{
				console.log("ERROR: getServerUrl() failed: HTTP status " + xhr.status);
				return "";
			}
		}
		catch (error)
		{
			console.log("ERROR: getServerUrl() failed: catch " + error);
			return "";
		}
	}
	
function decodeWin1255Param(value)
{
    const bytes = [];
    for (let i = 0; i < value.length; i++)
    {
        if (value[i] === '%' && i + 2 < value.length)
        {
            bytes.push(parseInt(value.substr(i + 1, 2), 16));
            i += 2;
        }
        else
        {
            bytes.push(value.charCodeAt(i));
        }
    }
    return new TextDecoder("windows-1255").decode(new Uint8Array(bytes));
}


function getQueryParams()
{
    try
    {
        console.log("getQueryParams()");

        const params = {};
        const searchString = window.location.search.substring(1);
        if (!searchString) return params;

        searchString.split("&").forEach(pair =>
        {
            const [key, rawValue] = pair.split("=");
            if (key)
            {
                let decodedValue = "";
                try
                {
                    decodedValue = decodeURIComponent(rawValue || "");
                }
                catch (e)
                {
                    console.log("WARN: decodeURIComponent failed for '" + key + "', trying windows-1255: " + e);
                    try
                    {
                        decodedValue = decodeWin1255Param(rawValue || "");
                    }
                    catch (e2)
                    {
                        console.log("ERROR: windows-1255 fallback also failed for '" + key + "': " + e2);
                        decodedValue = rawValue || ""; // last resort: keep raw
                    }
                }
                params[decodeURIComponent(key)] = decodedValue;
            }
        });
        return params;
    }
    catch(error)
    {
        console.log("ERROR: getQueryParams() failed: catch " + error);
        return "";
    }
}

	async function notifyServer(serverUrl, params)
	{
		try
		{
			console.log("notifyServer()");

			let i=0;
			for(i=0; i<10;  i++)
			{
				try
				{
					const response = await fetch(serverUrl,
					{
						method: "POST",
						headers: { "Content-Type": "text/plain;charset=utf-8" },
						body: JSON.stringify({ action: "max-hyp-success", ...params })
					});
					
					const data = await response.json();

					if (data.result === "server_is_buisy")
					{
						await new Promise(resolve => setTimeout(resolve, 1500)); // sleep
						continue;
					}

					return data;
				}
				catch (err)
				{
					await new Promise(resolve => setTimeout(resolve, 1500)); // sleep
				}
			}
			
			if(i == 10)
			{
				alert("עקב בעיה טכנית לא ברור אם התשלום נקלט, אנא צור עימנו קשר דרך הצור קשר באתר");
			}
		}
		catch(error)
		{
			console.log("ERROR: notifyServer() failed: catch " + error);
		}		
	}
		
	
	window.addEventListener('beforeunload', function (e) 
	{
		if (g_did_i_finish_reporting_to_server == 0) 
		{
			e.preventDefault();
			e.returnValue = '';
			return '';
		}
	});


	async function on_page_load()
	{
		try
		{
			console.log("on_page_load()");
					
			const params = getQueryParams();
			if(params == "")
			{
				alert("עקב בעיה טכנית לא ברור אם התשלום נקלט, אנא צור עימנו קשר דרך הצור קשר באתר");
				return;
			}
			
			var serverUrl = getServerUrl();
			
			let i = 0;			
			for(i=0; i<10 && serverUrl == ""; i++)
			{
				serverUrl = getServerUrl();
				await new Promise(resolve => setTimeout(resolve, 2000)); // sleep
			}
			
			if(i == 10)
			{
				alert("עקב בעיה טכנית לא ברור אם התשלום נקלט, אנא צור עימנו קשר דרך הצור קשר באתר");
				return;
			}
			
			const result = await notifyServer(serverUrl, params);

			const msgEl = document.getElementById("status-message");
			if (result && result.result === "ok")
			{
				g_did_i_finish_reporting_to_server = 1;
				msgEl.textContent = "התשלום אושר בהצלחה! תודה על הזמנתך.";
			}
			else
			{
				msgEl.textContent = "אירעה שגיאה. אנא צרו קשר.";
			}
		}
		catch(error)
		{
			console.log("ERROR: on_page_load() failed: catch " + error);
		}		
	}
