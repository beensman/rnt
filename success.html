<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>rumyah-and-tamar.com</title>

	<style>
		body
		{
			font-family: Arial, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			margin: 0;
			background: #f9f9f9;
		}
		#status-message
		{
			font-size: 1.3rem;
			color: #333;
			text-align: center;
			padding: 2rem;
		}
	</style>
	
	<script>
	
		var g_did_i_finish_reporting_to_server = 0;
		
		async function getServerUrl()
		{
			const cacheBuster = new Date().getTime(); // unique value each call to prevent from getting a chached version
			const response = await fetch("https://beensman.github.io/rnt/server_url.txt?v=" + cacheBuster);
			const text = await response.text();
			return text.trim();
		}

		function getQueryParams()
		{
			const params = {};
			const searchString = window.location.search.substring(1);
			if (!searchString) return params;

			searchString.split("&").forEach(pair =>
			{
				const [key, value] = pair.split("=");
				if (key)
				{
					params[decodeURIComponent(key)] = decodeURIComponent(value || "");
				}
			});
			return params;
		}

		async function notifyServer(serverUrl, params)
		{
			while (true)
			{
				try
				{
					const response = await fetch(serverUrl,
					{
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify(
						{
							action: "max-hyp-success",
							...params
						})
					});

					const data = await response.json();

					if (data.result === "server_is_buisy")
					{
						await new Promise(resolve => setTimeout(resolve, 1500));
						continue;
					}

					return data;
				}
				catch (err)
				{
					await new Promise(resolve => setTimeout(resolve, 1500));
				}
			}
		}
		
		window.addEventListener('beforeunload', function (e) 
		{
			if (g_did_i_finish_reporting_to_server == 0) 
			{
				e.preventDefault();
				e.returnValue = '';
				return '';
			}
		});

		async function on_page_load()
		{
			const params = getQueryParams();
			const serverUrl = await getServerUrl();
			const result = await notifyServer(serverUrl, params);

			const msgEl = document.getElementById("status-message");
			if (result && result.result === "ok")
			{
				g_did_i_finish_reporting_to_server = 1;
				msgEl.textContent = "התשלום אושר בהצלחה! תודה על הזמנתך.";
			}
			else
			{
				msgEl.textContent = "אירעה שגיאה. אנא צרו קשר.";
			}
		}
		
	</script>
	
</head>

<body onload="on_page_load();">
	<div id="status-message">מעדכן נתונים, נא לא לסגור את הדפדפן</div>

</body>
</html>
