	function showOverlay(overlay_text)
	{
		document.getElementById('g_overlay_text').innerText = overlay_text;
		document.getElementById('g_loading_overlay').style.display = 'flex';
	}

	function hideOverlay()
	{
		document.getElementById('g_loading_overlay').style.display = 'none';
	}
	
		
	async function update_inventory()
	{
	  try
	  {
		const response = await fetch(g_server_url,
		{
		  method: "POST",
		  headers: { "Content-Type": "text/plain;charset=utf-8" },
		  body: JSON.stringify({ action: "get_inventory" })
		});

		const result = await response.json();

		if (result.status !== "success")
		{
		  console.error("update_inventory() failed:", result.message);
		  return;
		}

		result.data.forEach(item =>
		{
		  const card  = document.querySelector(`.product-card[data-code="${item.product_code}"]`);
		  if (!card) return;

		  const input = card.querySelector(".quantity-input");
		  const stock = parseInt(item.amount_in_stock, 10);

		  // Update the max attribute
		  input.max = stock;

		  // If the user already selected more than what's now in stock, clamp it down
		  const current = parseInt(input.value, 10);
		  if (current > stock)
		  {
			input.value = stock;
			const unitPrice = parseInt(card.querySelector(".base-price").value, 10);
			card.querySelector(".total-price").innerText = stock * unitPrice;
			input.style.backgroundColor = stock > 0 ? "yellow" : "white";
			updateGrandTotal();
		  }
		});
	  }
	  catch (err)
	  {
		console.error("update_inventory() failed:", err);
	  }

	  // Schedule the next refresh in 60 seconds
	  setTimeout(update_inventory, 60 * 1000);
	}

	async function show_pickup_points()
	{
		await get_pickup_points();
		
		document.getElementById('g_pickup_points_select').innerHTML = 
			`<option value="not_selected">יש לבחור נקודת איסוף</option>` +

			.map(point => {
				return `
				<option value="${point.pickup_point_code}"> 
					${point.details_short}

			}).join('');
	}

	async function show_products()

		await get_products();

			.filter(product => product.show_on_shop === "1")
			.map(product => {

				<div class="product-card" data-code="${product.product_code}"> 
					<div class="product-top"> 
						<a target=_new href="${product.product_page_link}"> <img src="${product.thumbnail_image_file}" alt="${product.product_name}"> </a>

							<div class="product-description">${product.product_description}</div>

								</div> 
								<input type="hidden" value="${product.product_price_including_vat}" class="base-price"> 
								<div class="quantity-box"> 
									<button onclick="changeQuantity(this, 1);">+</button> 
									<input type="number" value="0" class="quantity-input" max="${product.amount_in_stock}" readonly> 
									<button onclick="changeQuantity(this, -1);">-</button> 
								</div> 
								<div class="total"> 
									סה"כ: <span class="total-price">0</span> ש"ח 
								</div> 
							</div>
						</div> 
					</div> 
				</div>`;
			}).join('');
	}

	async function get_delivery_date_text()

	function changeQuantity(btn, amount) 
	{
		const card = btn.closest('.product-card');
		const input = card.querySelector('.quantity-input');
		const totalPriceElement = card.querySelector('.total-price');
		const unitPrice = parseInt(card.querySelector('.base-price').value);
		
		let newQuantity = parseInt(input.value) + amount;
		
		if (newQuantity < 0) newQuantity = 0;
		
		const maxStock = parseInt(input.max);
		if (newQuantity > maxStock) newQuantity = maxStock;
		
		input.value = newQuantity;
		totalPriceElement.innerText = newQuantity * unitPrice;

		input.style.backgroundColor = newQuantity > 0 ? "yellow" : "white";
		
		updateGrandTotal();
	}
	

	function updateGrandTotal()
	{
		let grand = 0;
		document.querySelectorAll('.product-card').forEach(card => {
			const qty   = parseInt(card.querySelector('.quantity-input').value);
			const price = parseInt(card.querySelector('.base-price').value);
			grand += qty * price;
		});

		document.getElementById('g_grand_total').innerText = grand;
	}


	function onPickupPointChanged(sel)
	{
		if (sel.value === "not_selected")
			sel.style.backgroundColor = "yellow";
		else
			sel.style.backgroundColor = "white";
	}


	async function create_new_order()

		{

		  headers: { "Content-Type": "text/plain;charset=utf-8" },
		  body: JSON.stringify({ action: "create_new_order", order: g_order })
		});

		const result = await response.json();
		return result;
	  }
	  catch (err)
	  {
		console.error("create_new_order() failed:", err);
		return { is_success: 0, error_text: "שגיאת תקשורת עם השרת" };
	  }
	}
